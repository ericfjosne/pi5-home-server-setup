# Site Settings
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Site Data
locale: en-US
encoding: "utf-8"
title: "Raspberry Pi 5 setup as Home Server"
name: &name "Eric Fjøsne"
description: &description "A comprehensive guide to setting up a Raspberry Pi 5 as a home server. It can also probably be used for earlier Raspberry Pi devices, or even regular computers."
url: "https://ericfjosne.github.io"
baseurl: "/pi5-home-server"
repository: "ericfjosne/pi5-home-server"
enable_copy_code_button: true

# Site Author
author:
  name   : *name
  avatar : "https://avatars.githubusercontent.com/u/4800868"
  bio    : "Tech enthusiast and Pi 5 builder."
  location: "Stockholm, Sweden"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ericfjosne"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ericfjosne/"

# Site Footer
footer:
  links:
    - label: "Buy Me a Coffee"
      icon: "fas fa-fw fa-coffee"
      url: "https://www.buymeacoffee.com/ericfjosne"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ericfjosne"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/ericfjosne/"
  since: "2026"

# Defaults
defaults:
  - scope:
      path: "" # Apply to all files in the project
    values:
      layout: "single"
      read_time: false
      author_profile: false
      share: false
      comments: false
      toc_sticky: true
      show_page_nav: true # Enables custom "Previous/Next" navigation, using _includes/post_navigation.html
      sidebar:
        nav: "docs" # Links the sidebar to the 'docs' list in _data/navigation.yml

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-include-cache
